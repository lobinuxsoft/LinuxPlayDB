name: Update LinuxPlayDB Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday at 6 AM UTC (weekly)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Single pipeline step: processes one batch (default 1000 games).
      # Handles cycle management, all data sources, and DB finalization.
      - name: Run incremental pipeline
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          SKIP_STEAMSPY: "1"
        run: python scripts/pipeline.py --batch-size 1000
        timeout-minutes: 100

      # Commit to automation branch and create PR to main
      - name: Commit and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage data files
          git add -f \
            data/linuxplaydb.db \
            site/data/linuxplaydb.db \
            site/js/db_inline.js \
            scripts/manual/amd_specific.json \
            scripts/manual/linux_commands.json \
            scripts/manual/useful_links.json

          # Exit early if nothing changed
          if git diff --cached --quiet; then
            echo "No data changes detected, skipping."
            exit 0
          fi

          git commit -m "chore: weekly data update"

          # Push to automation branch (force-update since it's disposable)
          git push origin HEAD:refs/heads/automated/data-update --force

          # Create or update PR to main
          if gh pr list --head automated/data-update --base main --state open --json number --jq '.[0].number' | grep -q .; then
            echo "PR already exists, force-push updated it."
          else
            gh pr create \
              --base main \
              --head automated/data-update \
              --title "chore: weekly data update" \
              --body "Automated weekly update of game database, ProtonDB reports, and AI research data."
          fi
