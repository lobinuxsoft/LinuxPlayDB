name: Update LinuxPlayDB Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday at 6 AM UTC (weekly)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Step 1: Fetch ProtonDB reports (free, no API key)
      - name: Fetch ProtonDB reports
        run: python scripts/fetch_protondb_reports.py --delay 1.5
        continue-on-error: true

      # Step 2: AI research for games missing data (needs GROQ_API_KEY secret)
      # 50 games/week × ~15s each = ~13 min. Progress persists across runs.
      - name: AI research (Groq + DuckDuckGo)
        if: env.GROQ_API_KEY != ''
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/research_with_ai.py --limit 50 --delay 15
        continue-on-error: true
        timeout-minutes: 25

      # Step 3: Build database (Steam + NVIDIA + seed + manual data)
      # STEAM_API_KEY is already in env, build_db.py calls fetch_steam.py
      # which reads it. SteamSpy skipped in CI — IStoreService provides names.
      - name: Build database
        env:
          SKIP_STEAMSPY: "1"
        run: python scripts/build_db.py
        timeout-minutes: 10

      # Step 4: Incremental Steam detail fetch (names for new games)
      # 500 games per run at ~1.6s each = ~13 min. SteamSpy skipped.
      - name: Fetch Steam game details (incremental)
        run: python scripts/fetch_steam.py --skip-steamspy --details-limit 500
        continue-on-error: true
        timeout-minutes: 20

      # Step 5: Rebuild inline DB after details enrichment
      - name: Regenerate inline DB
        run: python scripts/build_db.py --inline-only

      # Step 6: Commit everything
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: weekly data update"
          file_pattern: >-
            data/linuxplaydb.db
            site/data/linuxplaydb.db
            site/js/db_inline.js
            scripts/manual/amd_specific.json
            scripts/manual/linux_commands.json
            scripts/manual/useful_links.json
            scripts/research_output/progress.json
